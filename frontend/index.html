<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KamAI — Real-time FSL sign language to text interpreter. No account needed." />
    <title>KamAI — Sign to Text</title>

    <!-- TensorFlow.js — runs your .h5 model locally in the browser, no backend needed -->
    <script
      src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"
      integrity="sha384-vE8hbVJ4lezako5rlvE7bY0BVzWlFhZncPlckrqNwcUQpVtgbENTgZ8TBbnPjZre"
      crossorigin="anonymous"
      data-vite-ignore></script>

    <!-- MediaPipe — hand landmark detection and skeleton overlay -->
    <script src="/mediapipe/camera_utils.js"  data-vite-ignore></script>
    <script src="/mediapipe/drawing_utils.js" data-vite-ignore></script>
    <script src="/mediapipe/hands.js"         data-vite-ignore></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Ko-fi floating widget — loads after React, never blocks render -->
    <script src="https://storage.ko-fi.com/cdn/scripts/overlay-widget.js" data-vite-ignore></script>
    <script data-vite-ignore>
      window.addEventListener('load', function () {
        if (typeof kofiWidgetOverlay !== 'undefined') {
          kofiWidgetOverlay.draw('arminandreibaldoza', {
            'type': 'floating-chat',
            'floating-chat.donateButton.text': 'Support me',
            'floating-chat.donateButton.background-color': '#2AABAC',
            'floating-chat.donateButton.text-color': '#ffffff'
          });
        }
      });
    </script>
  </body>
</html>
